version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "chthon-team"
    assignees:
      - "chthon-team"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # Ignore patch updates for specific packages if needed
      - dependency-name: "github.com/golang/mock"
        update-types: ["version-update:semver-patch"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" 
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "chthon-team"
    assignees:
      - "chthon-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "chthon-team"
    assignees:
      - "chthon-team"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Docker for each service
  - package-ecosystem: "docker"
    directory: "/services/api-gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "api-gateway"

  - package-ecosystem: "docker"
    directory: "/services/shortlink"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "shortlink-service"

  - package-ecosystem: "docker"
    directory: "/services/redirect"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "redirect-service"

  - package-ecosystem: "docker"
    directory: "/services/analytics"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "analytics-service"

  - package-ecosystem: "docker"
    directory: "/services/user-management"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
      - "user-management-service"

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'shortlink-service'
    static_configs:
      - targets: ['shortlink-service:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'redirect-service'
    static_configs:
      - targets: ['redirect-service:8083']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:8084']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'user-management-service'
    static_configs:
      - targets: ['user-management-service:8085']
    metrics_path: '/metrics'
    scrape_interval: 10s

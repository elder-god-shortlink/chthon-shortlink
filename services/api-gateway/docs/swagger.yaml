      parameters:
      - description: Short URL code for redirection
        in: path
        name: shortCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirect to original URL
          schema:
            type: string
        "404":
          description: Short URL not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true

  /api/v1/auth/login:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticate user with email and password to receive JWT access
        token
      parameters:
      - description: User email address
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with access_token and refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing email or password
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: User login authentication
      tags:
      - Authentication
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Refresh an expired JWT access token using a valid refresh token
        to maintain authenticated session
      parameters:
      - description: Valid refresh token for generating new access token
        in: formData
        name: refresh_token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully refreshed token with new access_token and refresh_token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing refresh token in request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid or expired refresh token
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error during token refresh
          schema:
            additionalProperties: true
            type: object
      summary: Refresh JWT access token
      tags:
      - Authentication
  /api/v1/auth/register:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Register a new user account with email, password and role
      parameters:
      - description: User email address
        in: formData
        name: email
        required: true
        type: string
      - description: User password
        in: formData
        name: password
        required: true
        type: string
      - description: 'User role (default: user)'
        in: formData
        name: role
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Registration successful with user details
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing required fields
          schema:
            additionalProperties: true
            type: object
        "409":
          description: User already exists
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Create new user account
      tags:
      - Authentication

  /api/v1/admin/stats:
    get:
      consumes:
      - application/json
      description: Retrieve comprehensive statistics for admin dashboard including
        user counts, link metrics, and system health
      produces:
      - application/json
      responses:
        "200":
          description: Admin statistics including user counts, link metrics, and system
            status
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized - invalid or missing authentication token
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - user does not have admin privileges
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error while fetching statistics
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get admin dashboard statistics
      tags:
      - Admin
